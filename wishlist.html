<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wishlist - ThePortal</title>
  <link rel="icon" type="image/png" href="movie.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .wishlist-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .wishlist-header {
      margin-bottom: 40px;
    }

    .wishlist-header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .wishlist-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .wishlist-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .wishlist-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-card-hover);
    }

    .wishlist-item-poster {
      width: 100%;
      height: 280px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .wishlist-item-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .wishlist-item-poster-placeholder {
      color: var(--text-muted);
      text-align: center;
      font-size: 0.85rem;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wishlist-item-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: background 0.2s;
    }

    .wishlist-item-remove:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .wishlist-item-content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .wishlist-item-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .wishlist-item-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .wishlist-item-rating {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .empty-state h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .btn-primary {
      display: inline-block;
      padding: 12px 24px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .error-message {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #dc3545;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- NAVBAR -->
  <header class="navbar" role="banner">
    <a href="/" class="logo" aria-label="ThePortal - Go to homepage">ThePortal</a>
    <button class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-menu">
      <span class="hamburger-line" aria-hidden="true"></span>
      <span class="hamburger-line" aria-hidden="true"></span>
      <span class="hamburger-line" aria-hidden="true"></span>
    </button>
    <nav id="nav-menu" role="navigation" aria-label="Primary navigation">
      <ul class="nav-list" role="list">
        <!-- Lists — plain text link -->
        <li class="nav-item" role="none">
          <a href="lists.html" class="nav-link" aria-label="View all lists">Lists</a>
        </li>

        <!-- Bored? — plain text link -->
        <li class="nav-item" role="none">
          <a href="bored.html" class="nav-link" aria-label="Find something interesting">Bored?</a>
        </li>

        <!-- Sign In — plain text link (replaced by auth.js when logged in) -->
        <li class="nav-item" role="none">
          <a href="signin.html" class="nav-link" aria-label="Sign in to your account">Sign In</a>
        </li>

        <!-- Theme toggle -->
        <li class="nav-item" role="none">
          <button class="theme-toggle" id="theme-toggle" aria-label="Switch to light mode" aria-pressed="false" title="Toggle dark/light mode">
            <svg class="icon icon-moon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon icon-sun" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="main" tabindex="-1">
    <div class="wishlist-container">
      <div class="wishlist-header">
        <h1>My Wishlist</h1>
        <p id="wishlist-count">Loading...</p>
      </div>

      <div id="message-container"></div>
      <div id="wishlist-content"></div>
    </div>
  </main>

  <div id="live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script>
    // Load wishlist on page load
    window.addEventListener('load', async () => {
      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '/signin.html';
        return;
      }

      try {
        const response = await fetch('/api/user/wishlist', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
          throw new Error('Failed to load wishlist');
        }

        const data = await response.json();
        displayWishlist(data.wishlist);
      } catch (error) {
        console.error('Error loading wishlist:', error);
        document.getElementById('message-container').innerHTML = '<div class="error-message">Failed to load wishlist. Please try again.</div>';
      }
    });

    function displayWishlist(wishlist) {
      const content = document.getElementById('wishlist-content');
      const countEl = document.getElementById('wishlist-count');

      countEl.textContent = `${wishlist.length} movie${wishlist.length !== 1 ? 's' : ''} in your wishlist`;

      if (wishlist.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📽️</div>
            <h2>Your wishlist is empty</h2>
            <p>Start adding movies to your wishlist to keep track of films you want to watch.</p>
            <a href="lists.html" class="btn-primary">Browse Movies</a>
          </div>
        `;
        return;
      }

      const token = localStorage.getItem('authToken');
      content.innerHTML = `
        <div class="wishlist-grid">
          ${wishlist.map(movie => `
            <div class="wishlist-item">
              <div class="wishlist-item-poster">
                ${movie.poster ? `<img src="${movie.poster}" alt="${movie.title}" />` : '<div class="wishlist-item-poster-placeholder">No Poster</div>'}
                <button class="wishlist-item-remove" data-movie-id="${movie.movieId}" aria-label="Remove from wishlist">✕</button>
              </div>
              <div class="wishlist-item-content">
                <div>
                  <div class="wishlist-item-title">${movie.title}</div>
                  <div class="wishlist-item-meta">
                    <span>${movie.year || 'N/A'}</span>
                    ${movie.imdbRating ? `<span class="wishlist-item-rating">⭐ ${movie.imdbRating}</span>` : ''}
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      // Add remove button listeners
      document.querySelectorAll('.wishlist-item-remove').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const movieId = btn.dataset.movieId;
          
          if (confirm('Remove from wishlist?')) {
            try {
              const response = await fetch(`/api/user/wishlist/${movieId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
              });

              if (!response.ok) {
                throw new Error('Failed to remove movie');
              }

              const data = await response.json();
              displayWishlist(data.wishlist);
            } catch (error) {
              console.error('Error removing movie:', error);
              alert('Failed to remove movie. Please try again.');
            }
          }
        });
      });

      // Add click to view movie details
      document.querySelectorAll('.wishlist-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (!e.target.closest('.wishlist-item-remove')) {
            const movieId = item.querySelector('.wishlist-item-remove').dataset.movieId;
            window.location.href = `/movie-detail.html?id=${encodeURIComponent(movieId)}`;
          }
        });
      });
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('authToken');
      window.location.href = '/signin.html';
    });
  </script>
</body>
</html>
